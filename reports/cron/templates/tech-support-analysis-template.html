<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <title>OxyGen CMS Tech Support Analysis</title>
</head>
<body style="margin:0;padding:0;background:#071116;color:#d9edf2;font-family:Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;color:#071116;opacity:0;">{{preheader}}</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;background:#071116;margin:0;padding:0;width:100%;">
    <tr>
      <td align="center" style="padding:12px 8px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;width:100%;max-width:640px;margin:0 auto;">
          <tr>
            <td style="background:#0b1b23;border:1px solid #164958;border-radius:16px;padding:18px 16px;">
              <img src="{{o2_logo_src}}" width="190" alt="O2 Intelligent Automation Solutions" style="display:block;width:190px;max-width:72%;height:auto;border:0;outline:none;text-decoration:none;margin:0 0 14px 0;">
              <div style="font-size:22px;line-height:27px;font-weight:800;color:#ecfeff;letter-spacing:.2px;">OxyGen CMS</div>
              <div style="font-size:17px;line-height:22px;font-weight:700;color:#ecfeff;margin-top:4px;">Tech Support Analysis</div>
              <div style="font-size:13px;line-height:18px;color:#9bc8d1;margin-top:8px;">{{report_date}} · {{environment_label}}</div>
            </td>
          </tr>
          <tr><td style="height:12px;line-height:12px;font-size:0;">&nbsp;</td></tr>
          <tr>
            <td style="background:#0d1b23;border:1px solid #173845;border-radius:14px;padding:16px;">
              <h2 style="margin:0 0 10px;font-size:18px;line-height:23px;color:#e8fbff;">Support Summary</h2>
              <p style="margin:0 0 10px;font-size:15px;line-height:22px;color:#d9edf2;">{{executive_summary}}</p>
              {{summary_cards}}
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;margin-top:14px;">
                <tr>
                  <td style="border-radius:12px;background:#22d3ee;">
                    <a href="{{oxygen_url}}" target="_blank" rel="noopener" style="display:inline-block;padding:11px 16px;font-size:14px;line-height:18px;font-weight:800;color:#06202a;text-decoration:none;border-radius:12px;">{{oxygen_button_label}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          {{sections}}
          <tr><td style="height:12px;line-height:12px;font-size:0;">&nbsp;</td></tr>
          <tr>
            <td style="font-size:12px;line-height:18px;color:#7da7b0;text-align:center;padding:10px 6px;">Prepared by Hermes, the OxyGen CMS AI assistant, for OPT/O2 technical support review. {{footer_note}}</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
