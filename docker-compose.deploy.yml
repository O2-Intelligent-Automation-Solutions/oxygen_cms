services:
  mysql:
    image: mysql:8.4
    container_name: ${CMS_MYSQL_CONTAINER_NAME:-oxygen-cms-prod-mysql}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-O2IAS_CMS}
      MYSQL_USER: ${MYSQL_USER:-oxygen_cms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - oxygen-cms-mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CMS_IMAGE:-oxygen-cms:local}
    container_name: ${CMS_APP_CONTAINER_NAME:-oxygen-cms-prod-app}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-O2IAS_CMS}
      MYSQL_USER: ${MYSQL_USER:-oxygen_cms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_PRIVILEGED_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      CMS_MANAGED_MYSQL: "true"
      OXYGEN_CMS_ENCRYPTION_KEY: ${OXYGEN_CMS_ENCRYPTION_KEY:?OXYGEN_CMS_ENCRYPTION_KEY is required}
    ports:
      - "${CMS_HTTP_PORT:-8080}:3000"
    volumes:
      - oxygen-cms-app-data:/app/apps/api/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  oxygen-cms-mysql:
  oxygen-cms-app-data:
