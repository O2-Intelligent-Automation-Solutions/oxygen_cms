openapi: 3.1.0
info:
  title: OxyGen CMS API
  version: 0.8.0
  summary: OxyGen Central Management Server API
  description: |
    API contract for OxyGen Central Management Server Phase 1.

    Current CMS schema version: 0.12.

    Phase 1 APIs cover first-run setup, local authentication/RBAC, tenant/user/group/role administration,
    manual OxyGen instance enrollment, dashboard background poller status/controls, application logs, grid preferences, and application settings.
servers:
  - url: http://localhost:3000
    description: Local API development server
  - url: https://{host}
    description: Deployed CMS server
    variables:
      host:
        default: cms.example.com
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Setup
  - name: Auth
  - name: Tenants
  - name: Roles
  - name: Groups
  - name: Users
  - name: Instances
  - name: Dashboard
  - name: System
  - name: Application Logs
  - name: Grid Preferences
  - name: Application Settings
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: API is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status, service, environment, timestamp]
                properties:
                  status:
                    type: string
                    const: ok
                  service:
                    type: string
                    const: oxygen-cms-api
                  environment:
                    type: string
                    example: development
                  timestamp:
                    type: string
                    format: date-time
  /api/setup/status:
    get:
      tags: [Setup]
      summary: Get first-run setup status
      security: []
      responses:
        '200':
          description: Current setup status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
  /api/setup/deployment:
    get:
      tags: [Setup]
      summary: Get public deployment setup configuration
      security: []
      responses:
        '200':
          description: Public deployment capabilities and defaults.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDeploymentConfig'
  /api/setup/database/provision-managed:
    post:
      tags: [Setup]
      summary: Provision managed self-contained MySQL database
      security: []
      responses:
        '200':
          description: Managed database provisioned and saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseProvisionResult'
        '400': { $ref: '#/components/responses/Error' }
        '501': { $ref: '#/components/responses/Error' }
  /api/setup/database/test-connection:
    post:
      tags: [Setup]
      summary: Test MySQL connection settings
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseSetupRequest'
      responses:
        '200':
          description: Connection test result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseConnectionTestResult'
        '400': { $ref: '#/components/responses/Error' }
  /api/setup/database/list-databases:
    post:
      tags: [Setup]
      summary: List databases visible to supplied MySQL credentials
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseSetupRequest'
      responses:
        '200':
          description: Database list.
          content:
            application/json:
              schema:
                type: object
                required: [databases, defaultDatabaseName]
                properties:
                  databases:
                    type: array
                    items: { type: string }
                  defaultDatabaseName:
                    type: string
                    example: O2IAS_CMS
        '400': { $ref: '#/components/responses/Error' }
  /api/setup/database/provision:
    post:
      tags: [Setup]
      summary: Provision or save custom MySQL database settings
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseSetupRequest'
      responses:
        '200':
          description: Database provisioned/saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseProvisionResult'
        '400': { $ref: '#/components/responses/Error' }
        '501': { $ref: '#/components/responses/Error' }
  /api/setup/database/apply-schema:
    post:
      tags: [Setup]
      summary: Apply pending CMS schema migrations
      security: []
      responses:
        '200':
          description: Schema applied.
          content:
            application/json:
              schema:
                type: object
                required: [ok, database, targetSchemaVersion, appliedVersions, nextStep]
                properties:
                  ok: { type: boolean, const: true }
                  database: { type: string }
                  targetSchemaVersion: { type: string, example: '0.09' }
                  appliedVersions:
                    type: array
                    items: { type: string }
                  nextStep: { type: string, enum: [admin] }
        '400': { $ref: '#/components/responses/Error' }
        '501': { $ref: '#/components/responses/Error' }
  /api/auth/bootstrap-status:
    get:
      tags: [Auth]
      summary: Determine whether first administrator bootstrap is required
      security: []
      responses:
        '200':
          description: Bootstrap status.
          content:
            application/json:
              schema:
                type: object
                required: [requiresBootstrap]
                properties:
                  requiresBootstrap: { type: boolean }
  /api/auth/bootstrap:
    post:
      tags: [Auth]
      summary: Create first SystemAdmin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapRequest'
      responses:
        '201':
          description: First administrator profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfile'
        '409': { $ref: '#/components/responses/Error' }
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Bearer token and user profile.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required: [token]
                    properties:
                      token: { type: string }
                  - $ref: '#/components/schemas/AuthProfile'
        '401': { $ref: '#/components/responses/Error' }
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Sign out current session
      responses:
        '200':
          description: Logout acknowledgement.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, const: true }
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated profile
      responses:
        '200':
          description: Current profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfile'
        '401': { $ref: '#/components/responses/Error' }
  /api/tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      responses:
        '200':
          description: Tenant list.
          content:
            application/json:
              schema:
                type: object
                required: [tenants]
                properties:
                  tenants:
                    type: array
                    items: { $ref: '#/components/schemas/Tenant' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      tags: [Tenants]
      summary: Create tenant
      requestBody: { $ref: '#/components/requestBodies/TenantInput' }
      responses:
        '201':
          description: Created tenant.
          content:
            application/json:
              schema:
                type: object
                required: [tenant]
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
        '400': { $ref: '#/components/responses/Error' }
  /api/tenants/{tenantId}:
    parameters:
      - $ref: '#/components/parameters/tenantId'
    patch:
      tags: [Tenants]
      summary: Update tenant
      requestBody: { $ref: '#/components/requestBodies/TenantInput' }
      responses:
        '200':
          description: Updated tenant.
          content:
            application/json:
              schema:
                type: object
                required: [tenant]
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Tenants]
      summary: Delete tenant
      responses:
        '204': { description: Tenant deleted. }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/roles:
    get:
      tags: [Roles]
      summary: List roles
      responses:
        '200':
          description: Role list.
          content:
            application/json:
              schema:
                type: object
                required: [roles]
                properties:
                  roles:
                    type: array
                    items: { $ref: '#/components/schemas/Role' }
    post:
      tags: [Roles]
      summary: Create role
      requestBody: { $ref: '#/components/requestBodies/RoleInput' }
      responses:
        '201':
          description: Created role.
          content:
            application/json:
              schema:
                type: object
                required: [role]
                properties:
                  role: { $ref: '#/components/schemas/Role' }
        '400': { $ref: '#/components/responses/Error' }
  /api/roles/{roleId}:
    parameters:
      - $ref: '#/components/parameters/roleId'
    patch:
      tags: [Roles]
      summary: Update role
      requestBody: { $ref: '#/components/requestBodies/RoleInput' }
      responses:
        '200':
          description: Updated role.
          content:
            application/json:
              schema:
                type: object
                required: [role]
                properties:
                  role: { $ref: '#/components/schemas/Role' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Roles]
      summary: Delete role
      responses:
        '204': { description: Role deleted. }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/groups:
    get:
      tags: [Groups]
      summary: List groups
      responses:
        '200':
          description: Group list.
          content:
            application/json:
              schema:
                type: object
                required: [groups]
                properties:
                  groups:
                    type: array
                    items: { $ref: '#/components/schemas/Group' }
    post:
      tags: [Groups]
      summary: Create group
      requestBody: { $ref: '#/components/requestBodies/GroupInput' }
      responses:
        '201':
          description: Created group.
          content:
            application/json:
              schema:
                type: object
                required: [group]
                properties:
                  group: { $ref: '#/components/schemas/Group' }
        '400': { $ref: '#/components/responses/Error' }
  /api/groups/{groupId}:
    parameters:
      - $ref: '#/components/parameters/groupId'
    patch:
      tags: [Groups]
      summary: Update group
      requestBody: { $ref: '#/components/requestBodies/GroupInput' }
      responses:
        '200':
          description: Updated group.
          content:
            application/json:
              schema:
                type: object
                required: [group]
                properties:
                  group: { $ref: '#/components/schemas/Group' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Groups]
      summary: Delete group
      responses:
        '204': { description: Group deleted. }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        '200':
          description: User profile list.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items: { $ref: '#/components/schemas/AuthProfile' }
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserInput' }
      responses:
        '201':
          description: Created user profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthProfile' }
        '400': { $ref: '#/components/responses/Error' }
  /api/users/{userId}:
    parameters:
      - $ref: '#/components/parameters/userId'
    patch:
      tags: [Users]
      summary: Update user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserInput' }
      responses:
        '200':
          description: Updated user profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthProfile' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Users]
      summary: Delete user
      responses:
        '204': { description: User deleted. }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/instances:
    get:
      tags: [Instances]
      summary: List accessible OxyGen instances
      parameters:
        - in: query
          name: includeArchived
          schema: { type: boolean, default: false }
          description: Include archived instances in the response. Archived instances are hidden from the default instance list but retained for dashboards/history and can be unarchived.
      responses:
        '200':
          description: Instance list scoped to the signed-in user's access.
          content:
            application/json:
              schema:
                type: object
                required: [instances]
                properties:
                  instances:
                    type: array
                    items: { $ref: '#/components/schemas/OxyGenInstance' }
        '401': { $ref: '#/components/responses/Error' }
    post:
      tags: [Instances]
      summary: Enroll OxyGen instance
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInstanceInput' }
      responses:
        '201':
          description: Created instance.
          content:
            application/json:
              schema:
                type: object
                required: [instance]
                properties:
                  instance: { $ref: '#/components/schemas/OxyGenInstance' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/instances/export.csv:
    get:
      tags: [Instances]
      summary: Export OxyGen instances as CSV
      description: SystemAdmin and TenantAdmin. Global users receive all instances with a `tenant` column containing Tenant names; blank tenant means global/unassigned. Tenant-scoped users receive only their Tenant's instances and the `tenant` column is omitted. The CSV includes `check_license`, `archived`, `metadata`, and `notes`; password values are never exported and the password column is always blank.
      responses:
        '200':
          description: CSV file of visible instances.
          content:
            text/csv:
              schema:
                type: string
                description: CSV with `instance_guid`, connection/configuration fields, and a blank `password` column. Global exports include `tenant` by Tenant name; tenant-scoped exports omit it.
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/instances/import:
    post:
      tags: [Instances]
      summary: Import OxyGen instances from CSV
      description: SystemAdmin and TenantAdmin. Upserts by `instance_guid` (the instance `id`). Blank `instance_guid` creates a new instance; an unknown nonblank GUID creates an instance with that GUID. Global users may include a `tenant` column with Tenant names, leaving it blank for global/unassigned instances; missing Tenant names are created for new instance rows. Tenant-scoped users must omit the `tenant` column; all creates/updates are forced to their assigned Tenant. Existing instance Tenant assignments cannot be changed. Blank passwords preserve the existing password on updates and are required for creates. Metadata must be valid JSON when provided.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportInstancesInput' }
      responses:
        '200':
          description: Import completed or dry-run summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceImportResult' }
        '400':
          description: Import validation failed; no rows persisted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceImportResult' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/instances/test-connectivity:
    post:
      tags: [Instances]
      summary: Test unsaved instance connectivity
      description: "Runs the same live DNS/TCP/TLS/auth/API connectivity check from create/edit modal connection values without creating or updating an enrolled instance, and without writing instance status/history. Authentication requires /v2/Auth/Login to return a 2xx/3xx response that is not a login/forbidden page and includes an OxyGen session cookie; missing/non-session cookies, forbidden pages, and login forms are auth failures. After successful authentication it probes GET /web-api/BUS/License when checkLicense is enabled, then GET /web-api/global/settings. A failed required License probe marks the result as reachable with issues and skips Settings/Triggers. checkLicense=false skips the License phase."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TestConnectivityInput' }
      responses:
        '200':
          description: Connectivity result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConnectivityResult' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/instances/{instanceId}:
    parameters:
      - $ref: '#/components/parameters/instanceId'
    get:
      tags: [Instances]
      summary: Get enrolled OxyGen instance detail
      description: Returns a single instance scoped to the signed-in user's effective instance access; used by the per-instance dashboard.
      responses:
        '200':
          description: Scoped instance detail.
          content:
            application/json:
              schema:
                type: object
                required: [instance]
                properties:
                  instance: { $ref: '#/components/schemas/OxyGenInstance' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      tags: [Instances]
      summary: Update enrolled OxyGen instance
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateInstanceInput' }
      responses:
        '200':
          description: Updated instance.
          content:
            application/json:
              schema:
                type: object
                required: [instance]
                properties:
                  instance: { $ref: '#/components/schemas/OxyGenInstance' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Instances]
      summary: Delete enrolled OxyGen instance
      responses:
        '204': { description: Instance deleted. }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/instances/{instanceId}/test-connectivity:
    parameters:
      - $ref: '#/components/parameters/instanceId'
    post:
      tags: [Instances]
      summary: Test instance connectivity
      description: "Runs a live, CMS-initiated Phase 1 connectivity test: DNS resolution, TCP connect, HTTPS certificate inspection when applicable, OxyGen form authentication requiring /v2/Auth/Login to return a 2xx/3xx response that is not a login/forbidden page and includes an OxyGen session cookie, GET /web-api/BUS/License when check_license is enabled, then GET /web-api/global/settings. Missing/non-session cookies, forbidden pages, login forms, and inaccessible authentication skip License, Settings, and Triggers phase details. Failed required License probes are stored as license errors and skip Settings/Triggers while preserving core availability as reachable. Updates instance availability/SSL/license status and appends connectivity/license history when using the MySQL repository."
      responses:
        '200':
          description: Connectivity result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConnectivityResult' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/system/poller:
    get:
      tags: [System]
      summary: Get background polling runner status
      description: Returns the shared background polling runner state used by the dashboard Service card.
      responses:
        '200':
          description: Poller status.
          content:
            application/json:
              schema:
                type: object
                required: [poller]
                properties:
                  poller: { $ref: '#/components/schemas/InstancePollerStatus' }
        '401': { $ref: '#/components/responses/Error' }
  /api/system/version:
    get:
      tags: [System]
      summary: Get CMS version and update availability
      description: SystemAdmin only. Returns current build metadata plus a non-blocking GitHub update check. If GitHub is unavailable, the route still returns current version metadata with `update.source=unavailable` and a non-secret error message.
      responses:
        '200':
          description: Version and update metadata.
          content:
            application/json:
              schema:
                type: object
                required: [version]
                properties:
                  version: { $ref: '#/components/schemas/SystemVersionSnapshot' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/system/database-performance:
    get:
      tags: [System]
      summary: Get CMS database performance metrics
      description: SystemAdmin only. Returns a lightweight MySQL performance snapshot for the CMS database, including information_schema table sizing, selected server counters, and the largest tables by data plus index size. The endpoint uses the configured CMS database connection and returns a non-throwing snapshot with `connected=false` and `error` when metrics cannot be read.
      responses:
        '200':
          description: Database performance snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [databasePerformance]
                properties:
                  databasePerformance: { $ref: '#/components/schemas/DatabasePerformanceSnapshot' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/system/poller/pause:
    post:
      tags: [System]
      summary: Pause the background polling runner
      description: SystemAdmin only. Pauses scheduled checks without stopping the API process.
      responses:
        '200':
          description: Poller paused.
          content:
            application/json:
              schema:
                type: object
                required: [poller]
                properties:
                  poller: { $ref: '#/components/schemas/InstancePollerStatus' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/system/poller/resume:
    post:
      tags: [System]
      summary: Resume the background polling runner
      description: SystemAdmin only. Resumes scheduled checks and recalculates next run time.
      responses:
        '200':
          description: Poller resumed.
          content:
            application/json:
              schema:
                type: object
                required: [poller]
                properties:
                  poller: { $ref: '#/components/schemas/InstancePollerStatus' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/system/poller/run-now:
    post:
      tags: [System]
      summary: Execute the background polling runner immediately
      description: SystemAdmin only. Forces an operator-initiated polling pass immediately, bypassing normal per-instance polling interval due checks while preserving in-flight instance protection.
      responses:
        '200':
          description: Poller run completed.
          content:
            application/json:
              schema:
                type: object
                required: [poller, summary]
                properties:
                  poller: { $ref: '#/components/schemas/InstancePollerStatus' }
                  summary:
                    oneOf:
                      - $ref: '#/components/schemas/InstancePollerSummary'
                      - type: 'null'
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/logs:
    get:
      tags: [Application Logs]
      summary: List persisted CMS application logs
      description: Returns database-backed Audit, Service, CRUD, Connection, Security, and UI log entries, newest first. CRUD entries are reserved for user-initiated entity mutations. API activity details include structured `apiCall`, `responseCode`, nullable `entityGuid`, and nullable `tenantId` fields. Tenant-scoped users are automatically limited to their tenant; SystemAdmin can query all tenant/global rows.
      parameters:
        - in: query
          name: type
          description: Filter to one or more log types. May be repeated (`type=Service&type=CRUD`) or comma-separated.
          style: form
          explode: true
          schema:
            type: array
            items: { $ref: '#/components/schemas/AppLogType' }
        - in: query
          name: severity
          description: Filter to one or more severity levels. May be repeated (`severity=Error&severity=Warning`) or comma-separated.
          style: form
          explode: true
          schema:
            type: array
            items: { $ref: '#/components/schemas/AppLogSeverity' }
        - in: query
          name: userName
          schema: { type: string }
          description: Exact user/source filter used by the Settings → Logs grid.
        - in: query
          name: entityGuid
          schema: { type: string, format: uuid }
          description: Filter logs associated with a specific instance/entity GUID.
        - in: query
          name: tenantId
          schema:
            type:
              - string
              - 'null'
            format: uuid
          description: Filter logs associated with a tenant. Tenant-scoped users are forced to their own tenant.
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: Log list.
          content:
            application/json:
              schema:
                type: object
                required: [logs, total]
                properties:
                  logs:
                    type: array
                    items: { $ref: '#/components/schemas/AppLogEntry' }
                  total: { type: integer, minimum: 0 }
        '401': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Application Logs]
      summary: Clear persisted CMS application logs
      description: Deletes all persisted application log entries. The clear operation itself is excluded from application log auto-capture to avoid immediately recreating a log row.
      responses:
        '200':
          description: Clear result.
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted: { type: integer, minimum: 0 }
        '401': { $ref: '#/components/responses/Error' }
  /api/grid-preferences/{gridKey}:
    parameters:
      - $ref: '#/components/parameters/gridKey'
    get:
      tags: [Grid Preferences]
      summary: Get current user's preference for a managed grid
      responses:
        '200':
          description: Grid preference or null.
          content:
            application/json:
              schema:
                type: object
                required: [preference]
                properties:
                  preference:
                    anyOf:
                      - $ref: '#/components/schemas/GridPreference'
                      - type: 'null'
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
    put:
      tags: [Grid Preferences]
      summary: Save current user's preference for a managed grid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GridPreferenceInput' }
      responses:
        '200':
          description: Saved grid preference.
          content:
            application/json:
              schema:
                type: object
                required: [preference]
                properties:
                  preference: { $ref: '#/components/schemas/GridPreference' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
  /api/app-settings/labels:
    get:
      tags: [Application Settings]
      summary: Get configurable application display labels
      responses:
        '200':
          description: Label settings.
          content:
            application/json:
              schema:
                type: object
                required: [labels]
                properties:
                  labels: { $ref: '#/components/schemas/AppLabels' }
        '401': { $ref: '#/components/responses/Error' }
    put:
      tags: [Application Settings]
      summary: Save configurable application display labels
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppLabels' }
      responses:
        '200':
          description: Saved label settings.
          content:
            application/json:
              schema:
                type: object
                required: [labels]
                properties:
                  labels: { $ref: '#/components/schemas/AppLabels' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
  /api/app-settings/log-retention:
    get:
      tags: [Application Settings]
      summary: Get application log retention setting
      responses:
        '200':
          description: Log retention setting.
          content:
            application/json:
              schema:
                type: object
                required: [retention]
                properties:
                  retention: { $ref: '#/components/schemas/LogRetentionSettings' }
        '401': { $ref: '#/components/responses/Error' }
    put:
      tags: [Application Settings]
      summary: Save application log retention setting
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogRetentionSettings' }
      responses:
        '200':
          description: Saved log retention setting.
          content:
            application/json:
              schema:
                type: object
                required: [retention]
                properties:
                  retention: { $ref: '#/components/schemas/LogRetentionSettings' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
  parameters:
    tenantId:
      name: tenantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    roleId:
      name: roleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    groupId:
      name: groupId
      in: path
      required: true
      schema: { type: string, format: uuid }
    userId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    instanceId:
      name: instanceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    gridKey:
      name: gridKey
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[a-zA-Z0-9_-]+$'
  requestBodies:
    TenantInput:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/TenantInput' }
    RoleInput:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/RoleInput' }
    GroupInput:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GroupInput' }
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        details: {}
    SetupStatus:
      type: object
      additionalProperties: true
      description: Setup status payload returned by the setup status provider.
      properties:
        databaseConfigured: { type: boolean }
        schemaCurrent: { type: boolean }
        targetSchemaVersion: { type: string, example: '0.09' }
        adminConfigured: { type: boolean }
        ready: { type: boolean }
    PublicDeploymentConfig:
      type: object
      additionalProperties: true
      properties:
        managedMysql: { type: boolean }
        mysql:
          type: object
          additionalProperties: true
    DatabaseSetupRequest:
      type: object
      required: [appPassword]
      properties:
        mode: { type: string, enum: [local-mysql, existing-mysql], default: local-mysql }
        host: { type: string }
        port: { type: integer, minimum: 1, default: 3306 }
        database: { type: string, default: O2IAS_CMS }
        adminUser: { type: string }
        adminPassword: { type: string, writeOnly: true }
        appUser: { type: string, default: oxygen_cms }
        appPassword: { type: string, minLength: 12, writeOnly: true }
    DatabaseProvisionResult:
      type: object
      required: [ok, mode, database, createdDatabase, createdUser, nextStep]
      properties:
        ok: { type: boolean, const: true }
        mode: { type: string }
        database: { type: string }
        createdDatabase: { type: boolean }
        createdUser: { type: boolean }
        nextStep: { type: string, enum: [schema] }
    DatabaseConnectionTestResult:
      type: object
      required: [ok, mode, database, message]
      properties:
        ok: { type: boolean }
        mode: { type: string, enum: [local-mysql, existing-mysql] }
        database: { type: string }
        message: { type: string }
        serverVersion: { type: [string, 'null'] }
    BootstrapRequest:
      type: object
      required: [email, displayName, password]
      properties:
        email: { type: string, format: email }
        displayName: { type: string, minLength: 1 }
        password: { type: string, minLength: 12, writeOnly: true }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1, writeOnly: true }
    TenantInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
    RoleInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        tenantId: { type: [string, 'null'], format: uuid }
    GroupInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        tenantId: { type: [string, 'null'], format: uuid }
        instanceAccessMode: { $ref: '#/components/schemas/GroupInstanceAccessMode' }
        instanceIds:
          type: array
          items: { type: string, format: uuid }
          default: []
    CreateUserInput:
      type: object
      required: [email, displayName, password, roleNames]
      properties:
        email: { type: string, format: email }
        displayName: { type: string, minLength: 1 }
        password: { type: string, minLength: 12, writeOnly: true }
        roleNames:
          type: array
          minItems: 1
          items: { type: string }
        groupIds:
          type: array
          items: { type: string, format: uuid }
          default: []
        tenantId: { type: [string, 'null'], format: uuid }
        instanceAccessMode: { $ref: '#/components/schemas/UserInstanceAccessMode' }
        instanceIds:
          type: array
          items: { type: string, format: uuid }
          default: []
    UpdateUserInput:
      allOf:
        - $ref: '#/components/schemas/CreateUserInput'
        - type: object
          properties:
            password: { type: string, minLength: 0, writeOnly: true, description: Blank or omitted means unchanged. }
    CreateInstanceInput:
      type: object
      required: [name, username, password]
      properties:
        id: { type: string, format: uuid, description: Optional instance GUID. Used by CSV import to create instances with an exported `instance_guid`. }
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        tenantId: { type: [string, 'null'], format: uuid }
        protocol: { $ref: '#/components/schemas/InstanceProtocol' }
        host: { type: string, description: Hostname/domain without protocol, or normalized from hostname. }
        port: { type: [integer, 'null'], minimum: 1, maximum: 65535 }
        hostname: { type: string, description: Legacy/full hostname input; host or hostname is required. }
        username: { type: string, default: admin }
        password: { type: string, writeOnly: true, description: Remote OxyGen credential. Stored encrypted at rest using AES-256-GCM and never returned by API responses. Requires OXYGEN_CMS_ENCRYPTION_KEY when persisted to MySQL. }
        pollingIntervalSeconds: { type: integer, minimum: 60, maximum: 86400, default: 300 }
        isEnabled: { type: boolean, default: true }
        checkLicense: { type: boolean, default: true, description: Whether connectivity polling should call the OxyGen license/settings API. When false, the license probe is skipped. }
        archived: { type: boolean, default: false, description: Hide this server from the default instance list while retaining data/history. }
        metadata: { type: [object, 'null'], additionalProperties: true, description: Custom instance metadata shown as a JSON card on the Instance Dashboard. }
        notes: { type: [string, 'null'], description: Large instance notes block. The UI auto-detects HTML, Markdown, RTF, or plain text for dashboard display. }
    TestConnectivityInput:
      type: object
      required: [username, password]
      properties:
        protocol: { $ref: '#/components/schemas/InstanceProtocol' }
        host: { type: string, description: Hostname/domain without protocol, or normalized from hostname. }
        port: { type: [integer, 'null'], minimum: 1, maximum: 65535 }
        hostname: { type: string, description: Legacy/full hostname input; host or hostname is required. }
        username: { type: string, default: admin }
        password: { type: string, writeOnly: true, description: Remote OxyGen credential used only for this live test and never persisted by this endpoint. }
        checkLicense: { type: boolean, default: true, description: Whether this live test should call the OxyGen License phase before Settings. When false, the License phase is skipped. }
    UpdateInstanceInput:
      allOf:
        - $ref: '#/components/schemas/CreateInstanceInput'
        - type: object
          properties:
            password: { type: string, writeOnly: true, description: Blank or omitted means unchanged. Non-blank replacement credentials are stored encrypted at rest and never returned by API responses. }
    ImportInstancesInput:
      type: object
      required: [csv]
      properties:
        csv:
          type: string
          description: CSV text to import. Headers are `instance_guid,name,description,tenant,protocol,host,port,username,polling_interval_seconds,is_enabled,check_license,archived,metadata,notes,password` for global users and the same list without `tenant` for tenant-scoped users. Column order is header-driven, and trailing blank spreadsheet columns are ignored. Global create rows create missing Tenant names automatically. `metadata` must be valid JSON when nonblank; `notes` may contain HTML, Markdown, RTF, or plain text.
        dryRun:
          type: boolean
          default: false
          description: Validate and summarize without persisting changes.
    InstanceImportRowResult:
      type: object
      required: [rowNumber, instanceGuid, name, action, errors, warnings]
      properties:
        rowNumber: { type: integer, minimum: 1 }
        instanceGuid: { type: [string, 'null'], format: uuid }
        name: { type: [string, 'null'] }
        action: { type: string, enum: [create, update, skip, error] }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        instance:
          oneOf:
            - $ref: '#/components/schemas/OxyGenInstance'
            - type: 'null'
    InstanceImportResult:
      type: object
      required: [dryRun, created, updated, failed, rows]
      properties:
        dryRun: { type: boolean }
        created: { type: integer, minimum: 0 }
        updated: { type: integer, minimum: 0 }
        failed: { type: integer, minimum: 0 }
        rows:
          type: array
          items: { $ref: '#/components/schemas/InstanceImportRowResult' }
    Tenant:
      allOf:
        - $ref: '#/components/schemas/TenantInput'
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          required: [id, name, description, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            description: { type: [string, 'null'] }
    Role:
      allOf:
        - $ref: '#/components/schemas/RoleInput'
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          required: [id, name, description, tenantId, isSystem, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            tenantId: { type: [string, 'null'], format: uuid }
            isSystem: { type: boolean }
    Group:
      allOf:
        - $ref: '#/components/schemas/GroupInput'
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          required: [id, name, description, tenantId, instanceAccessMode, instanceIds, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
    PublicUser:
      type: object
      required: [id, email, displayName, tenantId, instanceAccessMode, instanceIds, isActive, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        tenantId: { type: [string, 'null'], format: uuid }
        instanceAccessMode: { $ref: '#/components/schemas/UserInstanceAccessMode' }
        instanceIds:
          type: array
          items: { type: string, format: uuid }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AuthProfile:
      type: object
      required: [user, roles, groups]
      properties:
        user: { $ref: '#/components/schemas/PublicUser' }
        roles:
          type: array
          items: { type: string }
        groups:
          type: array
          items:
            type: object
            required: [id, name, tenantId, instanceAccessMode, instanceIds]
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              tenantId: { type: [string, 'null'], format: uuid }
              instanceAccessMode: { $ref: '#/components/schemas/GroupInstanceAccessMode' }
              instanceIds:
                type: array
                items: { type: string, format: uuid }
    DashboardSummary:
      type: object
      required: [scope, tenant, poller, counts, instances]
      properties:
        scope: { type: string, enum: [tenant, global] }
        tenant:
          oneOf:
            - $ref: '#/components/schemas/Tenant'
            - type: 'null'
        poller:
          oneOf:
            - $ref: '#/components/schemas/InstancePollerStatus'
            - type: 'null'
        counts:
          type: object
          required: [tenants, groups, users, roles, tenantRoles, globalRoles, instances, totalInstances, instancesWithIssues, upInstances, downInstances, sslIssues, licenseIssues, disabledInstances, connectivityIssues, processingIssues, unknownInstances]
          properties:
            tenants: { type: integer, minimum: 0 }
            groups: { type: integer, minimum: 0 }
            users: { type: integer, minimum: 0 }
            roles: { type: integer, minimum: 0 }
            tenantRoles: { type: integer, minimum: 0 }
            globalRoles: { type: integer, minimum: 0 }
            instances: { type: integer, minimum: 0, description: Alias of totalInstances for UI compatibility. }
            totalInstances: { type: integer, minimum: 0 }
            instancesWithIssues: { type: integer, minimum: 0 }
            upInstances: { type: integer, minimum: 0 }
            downInstances: { type: integer, minimum: 0 }
            sslIssues: { type: integer, minimum: 0, description: Visible HTTPS instances with invalid certificates or SSL probe warnings. SSL issues are warnings, not connectivity failures. }
            licenseIssues: { type: integer, minimum: 0, description: Visible instances with missing, warning, expired, or error license state. }
            disabledInstances: { type: integer, minimum: 0 }
            connectivityIssues: { type: integer, minimum: 0, description: Visible instances whose availability status is down, auth-error, or another non-up/non-unknown connectivity state excluding SSL warnings. }
            processingIssues: { type: integer, minimum: 0, description: Visible instances with processing, EMM queue, SMS, or Hangfire component status outside ok/unknown. }
            unknownInstances: { type: integer, minimum: 0, description: Visible instances with unknown availability, SSL, license, or processing component state. }
        instances:
          type: array
          items: { $ref: '#/components/schemas/DashboardInstance' }
    DashboardInstance:
      allOf:
        - $ref: '#/components/schemas/OxyGenInstance'
        - type: object
          required: [issues, issueCount, hasIssue, severity, primaryIssue]
          properties:
            issues:
              type: array
              description: "Raw issue labels emitted by the API. The UI may normalize noisy endpoint-specific labels, for example grouping `Connection timed out: <ip>:<port>` under `Connecting time out`."
              items: { type: string }
            issueDetails:
              type: array
              description: "Raw issue labels and severities used by dashboard filters/cards. The UI may normalize labels for display/filter grouping while preserving the raw issue details in logs/history."
              items:
                type: object
                required: [label, severity]
                properties:
                  label: { type: string }
                  severity: { type: string, enum: [warning, failure] }
            issueCount: { type: integer, minimum: 0 }
            hasIssue: { type: boolean }
            severity: { type: string, enum: [ok, warning, failure, unknown], description: Highest dashboard severity for the instance card. Failures render red, warnings render yellow, healthy renders green. }
            primaryIssue: { type: [string, 'null'], description: Most critical issue/warning label to show on dashboard instance cards. The UI may normalize noisy endpoint-specific labels, for example grouping connection timeouts by category. }
    OxyGenInstance:
      type: object
      required: [id, name, description, tenantId, protocol, host, port, hostname, baseUrl, launchUrl, apiBaseUrl, username, pollingIntervalSeconds, isEnabled, checkLicense, archived, metadata, notes, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, 'null'] }
        tenantId: { type: [string, 'null'], format: uuid }
        protocol: { $ref: '#/components/schemas/InstanceProtocol' }
        host: { type: string }
        port: { type: [integer, 'null'] }
        hostname: { type: string }
        baseUrl: { type: string, format: uri }
        launchUrl: { type: string, format: uri }
        apiBaseUrl: { type: string, format: uri }
        username: { type: string }
        pollingIntervalSeconds: { type: integer }
        isEnabled: { type: boolean }
        checkLicense: { type: boolean, description: Whether the OxyGen license/settings API should be checked during polling. }
        archived: { type: boolean, description: Hidden from default instance lists while data is retained. }
        metadata: { type: [object, 'null'], additionalProperties: true }
        notes: { type: [string, 'null'] }
        status: { $ref: '#/components/schemas/InstanceStatus' }
        sslValid: { type: [boolean, 'null'] }
        sslExpiresAt: { type: [string, 'null'], format: date-time }
        lastCheckedAt: { type: [string, 'null'], format: date-time }
        lastSuccessAt: { type: [string, 'null'], format: date-time }
        lastFailureAt: { type: [string, 'null'], format: date-time }
        uptimePercent24h: { type: [number, 'null'] }
        uptimePercent7d: { type: [number, 'null'] }
        responseTimeMs: { type: [integer, 'null'] }
        lastError: { type: [string, 'null'] }
        processingStatus: { $ref: '#/components/schemas/ComponentStatus' }
        emmQueueStatus: { $ref: '#/components/schemas/ComponentStatus' }
        smsStatus: { $ref: '#/components/schemas/ComponentStatus' }
        hangfireStatus: { $ref: '#/components/schemas/ComponentStatus' }
        licenseKey: { type: [string, 'null'] }
        licenseStatus: { $ref: '#/components/schemas/LicenseStatus' }
        licenseJson: { description: Raw payload returned by the OxyGen license probe for the License JSON dialog. Skipped License phases caused by connection/auth blockers preserve the prior license rollup and do not count as dashboard License Errors. }
        settingsJson: { description: Raw payload returned by GET /web-api/global/settings. The Instance Dashboard Settings card extracts non-queue BUS_Auto_Purge, OxyGen_Version, and ClientDomain values from this payload; queue enable/paused values from BUS/EMM/SMS/Hangfire groups render on Workflow & Components rows; the Settings dialog shows the full JSON. }
        workflowSummaryJson: {}
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ConnectivityStepResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        skipped: { type: boolean, nullable: true }
        message: { type: string, nullable: true }
        httpStatusCode: { type: integer, nullable: true }
        durationMs: { type: integer, minimum: 0, nullable: true, description: Step-level phase timing when captured. }
        errorCode: { type: string, nullable: true }
        valid: { type: boolean, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        address: { type: string, nullable: true, description: Resolved IP address for DNS phases. }
        family: { type: integer, nullable: true, description: IP address family returned by DNS resolution. }
        host: { type: string, nullable: true, description: Host or resolved IP used by the TCP connect phase. }
        port: { type: integer, nullable: true, description: TCP port used by the connect phase. }
    LicenseProbeResult:
      type: object
      required: [step, status, key, payload]
      properties:
        step: { $ref: '#/components/schemas/ConnectivityStepResult' }
        status: { $ref: '#/components/schemas/LicenseStatus' }
        key: { type: [string, 'null'] }
        payload: {}
    ConnectivityResult:
      type: object
      required: [ok, status, message, checkedAt, durationMs, responseTimeMs, httpStatusCode, dns, connect, ssl, authentication, api, settingsJson, license]
      properties:
        ok: { type: boolean }
        status: { type: string, enum: [reachable, unreachable, auth-error, ssl-error] }
        message: { type: string }
        checkedAt: { type: string, format: date-time }
        durationMs: { type: integer, minimum: 0, description: Full connectivity refresh duration including authentication and API/license probes. }
        responseTimeMs: { type: integer, minimum: 0, nullable: true, description: Dashboard response time as Resolve + Connect + SSL + Auth for collected, non-skipped phases. }
        httpStatusCode: { type: integer, nullable: true }
        dns: { $ref: '#/components/schemas/ConnectivityStepResult' }
        connect: { $ref: '#/components/schemas/ConnectivityStepResult' }
        ssl: { $ref: '#/components/schemas/ConnectivityStepResult' }
        authentication: { $ref: '#/components/schemas/ConnectivityStepResult' }
        api: { $ref: '#/components/schemas/ConnectivityStepResult' }
        settingsJson: { description: Raw JSON payload returned by the Settings phase (`GET /web-api/global/settings`) when collected; null when Settings was skipped or failed before a JSON payload was available. }
        license: { $ref: '#/components/schemas/LicenseProbeResult' }
    InstancePollerSummary:
      type: object
      required: [checked, skipped, failed]
      properties:
        checked: { type: integer, minimum: 0 }
        skipped: { type: integer, minimum: 0 }
        failed: { type: integer, minimum: 0 }
    InstancePollerStatus:
      type: object
      required: [state, isRunning, isPaused, tickIntervalMs, inFlight, lastRunAt, nextRunAt, lastSummary, lastError]
      properties:
        state: { type: string, enum: [running, paused, stopped] }
        isRunning: { type: boolean }
        isPaused: { type: boolean }
        tickIntervalMs: { type: integer, minimum: 1 }
        inFlight: { type: integer, minimum: 0 }
        lastRunAt: { type: [string, 'null'], format: date-time }
        nextRunAt: { type: [string, 'null'], format: date-time }
        lastSummary:
          oneOf:
            - $ref: '#/components/schemas/InstancePollerSummary'
            - type: 'null'
        lastError: { type: [string, 'null'] }
    SystemVersionSnapshot:
      type: object
      required: [current, update]
      properties:
        current: { $ref: '#/components/schemas/CurrentVersionInfo' }
        update: { $ref: '#/components/schemas/UpdateCheckResult' }
    CurrentVersionInfo:
      type: object
      required: [version, commit, buildDate, repository, sourceUrl, updateChannel]
      properties:
        version: { type: string, example: 0.1.0 }
        commit: { type: [string, 'null'], description: Build/source commit when supplied by deployment metadata. }
        buildDate: { type: [string, 'null'], format: date-time, description: Build timestamp when supplied by deployment metadata. }
        repository: { type: string, example: O2-Intelligent-Automation-Solutions/oxygen_cms }
        sourceUrl: { type: string, format: uri }
        updateChannel: { type: string, example: stable }
    UpdateCheckResult:
      type: object
      required: [checkedAt, source, available, currentVersion, latestVersion, latestName, releaseUrl, publishedAt, error]
      properties:
        checkedAt: { type: string, format: date-time }
        source: { type: string, enum: [github-release, github-tag, unavailable] }
        available: { type: boolean }
        currentVersion: { type: string }
        latestVersion: { type: [string, 'null'] }
        latestName: { type: [string, 'null'] }
        releaseUrl: { type: [string, 'null'], format: uri }
        publishedAt: { type: [string, 'null'], format: date-time }
        error: { type: [string, 'null'], description: Non-secret update-check failure message when GitHub cannot be reached or returns an unusable response. }
    DatabasePerformanceSnapshot:
      type: object
      required: [configured, connected, database, generatedAt, error, summary, server, topTables, queryDigests]
      properties:
        configured: { type: boolean }
        connected: { type: boolean }
        database: { type: [string, 'null'] }
        generatedAt: { type: string, format: date-time }
        error: { type: [string, 'null'] }
        summary:
          type: object
          required: [tableCount, estimatedRows, dataSizeBytes, indexSizeBytes, freeBytes, totalSizeBytes]
          properties:
            tableCount: { type: integer, minimum: 0 }
            estimatedRows: { type: integer, minimum: 0, description: Approximate row count from information_schema.tables.table_rows. }
            dataSizeBytes: { type: integer, minimum: 0 }
            indexSizeBytes: { type: integer, minimum: 0 }
            freeBytes: { type: integer, minimum: 0 }
            totalSizeBytes: { type: integer, minimum: 0 }
        server:
          type: object
          required: [version, uptimeSeconds, maxConnections, threadsConnected, maxUsedConnections, slowQueries, longQueryTimeSeconds, questions, abortedConnects, bufferPoolReadHitPercent]
          properties:
            version: { type: [string, 'null'] }
            uptimeSeconds: { type: [integer, 'null'], minimum: 0 }
            maxConnections: { type: [integer, 'null'], minimum: 0 }
            threadsConnected: { type: [integer, 'null'], minimum: 0 }
            maxUsedConnections: { type: [integer, 'null'], minimum: 0 }
            slowQueries: { type: [integer, 'null'], minimum: 0, description: MySQL `Slow_queries` status counter since server startup. }
            longQueryTimeSeconds: { type: [number, 'null'], minimum: 0, description: Current MySQL `long_query_time` threshold used to increment `Slow_queries`. }
            questions: { type: [integer, 'null'], minimum: 0 }
            abortedConnects: { type: [integer, 'null'], minimum: 0 }
            bufferPoolReadHitPercent: { type: [number, 'null'], minimum: 0, maximum: 100 }
        topTables:
          type: array
          items: { $ref: '#/components/schemas/DatabaseTablePerformance' }
        queryDigests:
          type: array
          description: Normalized statement patterns from performance_schema ordered by total execution time when available.
          items: { $ref: '#/components/schemas/DatabaseQueryDigestPerformance' }
    DatabaseTablePerformance:
      type: object
      required: [tableName, engine, rowEstimate, dataSizeBytes, indexSizeBytes, freeBytes, totalSizeBytes, updatedAt]
      properties:
        tableName: { type: string }
        engine: { type: [string, 'null'] }
        rowEstimate: { type: integer, minimum: 0 }
        dataSizeBytes: { type: integer, minimum: 0 }
        indexSizeBytes: { type: integer, minimum: 0 }
        freeBytes: { type: integer, minimum: 0 }
        totalSizeBytes: { type: integer, minimum: 0 }
        updatedAt: { type: [string, 'null'], format: date-time }
    DatabaseQueryDigestPerformance:
      type: object
      required: [digestText, count, totalTimeSeconds, avgTimeSeconds, rowsExamined, rowsSent, errors, warnings, firstSeen, lastSeen]
      properties:
        digestText: { type: string, description: Normalized SQL statement pattern; literals are replaced by placeholders by MySQL performance_schema. }
        count: { type: integer, minimum: 0 }
        totalTimeSeconds: { type: number, minimum: 0 }
        avgTimeSeconds: { type: number, minimum: 0 }
        rowsExamined: { type: integer, minimum: 0 }
        rowsSent: { type: integer, minimum: 0 }
        errors: { type: integer, minimum: 0 }
        warnings: { type: integer, minimum: 0 }
        firstSeen: { type: [string, 'null'], format: date-time }
        lastSeen: { type: [string, 'null'], format: date-time }
    AppLogType:
      type: string
      enum: [Audit, Service, CRUD, Connection, Security, UI]
    AppLogSeverity:
      type: string
      enum: [Critical, Error, Warning, Logging, Verbose]
    AppLogEntry:
      type: object
      required: [id, type, severity, source, userName, entityGuid, tenantId, message, details, createdAt]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/AppLogType' }
        severity: { $ref: '#/components/schemas/AppLogSeverity' }
        source: { type: string }
        userName: { type: [string, 'null'] }
        entityGuid: { type: [string, 'null'], format: uuid }
        tenantId: { type: [string, 'null'], format: uuid }
        message: { type: string }
        details:
          type: object
          nullable: true
          additionalProperties: true
          description: Structured log context. User API activity includes `apiCall`, `responseCode`, nullable `entityGuid`, and nullable `tenantId`; legacy-compatible fields may also include `method`, `url`, and `statusCode`.
        createdAt: { type: string, format: date-time }
    LogRetentionSettings:
      type: object
      required: [days]
      properties:
        days: { type: integer, minimum: 1, maximum: 3650, default: 90 }
    GridPreferenceInput:
      type: object
      required: [columns, sort, group, filter, filtersVisible]
      properties:
        columns:
          type: array
          items: { $ref: '#/components/schemas/GridColumnPreference' }
        sort:
          type: array
          items: { $ref: '#/components/schemas/GridSortPreference' }
        group:
          type: array
          items: { $ref: '#/components/schemas/GridGroupPreference' }
        filter: {}
        filtersVisible: { type: boolean }
    GridPreference:
      allOf:
        - $ref: '#/components/schemas/GridPreferenceInput'
        - type: object
          required: [userId, gridKey, createdAt, updatedAt]
          properties:
            userId: { type: string, format: uuid }
            gridKey: { type: string }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    GridColumnPreference:
      type: object
      required: [key, title, visible, order]
      properties:
        key: { type: string, maxLength: 128 }
        title: { type: string, maxLength: 255 }
        visible: { type: boolean }
        order: { type: integer, minimum: 0 }
        width:
          oneOf:
            - type: number
            - type: string
    GridSortPreference:
      type: object
      required: [field, dir]
      properties:
        field: { type: string, maxLength: 128 }
        dir: { type: string, enum: [asc, desc] }
    GridGroupPreference:
      type: object
      required: [field]
      additionalProperties: true
      properties:
        field: { type: string, maxLength: 128 }
    AppLabels:
      type: object
      required: [tenant]
      properties:
        tenant: { type: string, minLength: 1, maxLength: 64, example: Tenant }
    EntityTimestamps:
      type: object
      required: [createdAt, updatedAt]
      properties:
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    InstanceProtocol:
      type: string
      enum: [http, https]
      default: https
    InstanceStatus:
      type: string
      enum: [unknown, up, down, auth-error, ssl-error]
    ComponentStatus:
      type: string
      enum: [unknown, ok, warning, error]
    LicenseStatus:
      type: string
      enum: [unknown, valid, expired, warning, error]
    GroupInstanceAccessMode:
      type: string
      enum: [none, all, specific]
      default: none
    UserInstanceAccessMode:
      type: string
      enum: [inherit, none, all, specific]
      default: inherit
